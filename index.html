<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHP PLAY</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#070707;
    font-family:Arial,sans-serif;
    min-height:100vh;
    padding:12px;
}

/* CONTAINER */
.bio-container{
    width:100%;
    max-width:520px;
    margin:auto;
    position:relative;
    padding:4px;
    border-radius:25px;
}

/* RGB BORDER */
.bio-container::before{
    content:"";
    position:absolute;
    inset:-4px;
    border-radius:28px;
    background:linear-gradient(90deg,#ff0000,#ff00ff,#00ffe1,#00ff00,#ff0000);
    background-size:400%;
    animation:led 6s linear infinite;
    filter:blur(8px);
    z-index:-1;
}

.bio-container::after{
    content:"";
    position:absolute;
    inset:2px;
    border-radius:22px;
    background:#070707;
    z-index:-1;
}

/* PROFILE */
.profile{
    text-align:center;
    padding:25px 15px;
}

/* AVATAR */
.avatar-rgb{
    width:170px;
    height:170px;
    margin:auto;
    border-radius:50%;
    position:relative;
}

.avatar-rgb::before{
    content:"";
    position:absolute;
    inset:-5px;
    border-radius:50%;
    background:linear-gradient(90deg,#ff0000,#ff00ff,#00ffe1,#00ff00,#ff0000);
    background-size:400%;
    animation:led 6s linear infinite;
    filter:blur(7px);
    z-index:0;
}

.avatar-rgb img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    position:relative;
    z-index:1;
    border:4px solid #111;
}

/* TEXT */
.profile h1{
    color:#fff;
    font-size:38px;
    margin-top:15px;
    text-shadow:0 0 10px #00ffe1,0 0 20px #ff00ff;
}

.profile p{
    color:#00ffe1;
    font-size:16px;
}

/* VOUCHER */
.voucher-box{
    background:linear-gradient(45deg,#ff00ff,#00ffe1);
    color:#fff;
    text-align:center;
    padding:18px;
    border-radius:15px;
    margin-bottom:20px;
    font-weight:bold;
    font-size:18px;
    cursor:pointer;
    animation:pulse 2s infinite;
}

/* MENU */
.menu{
    width:100%;
    background:#111;
    color:#fff;
    padding:18px;
    margin-top:15px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-size:16px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    border:1px solid #00ffe1;
    transition:0.3s;
}

.menu:hover{
    background:#00ffe1;
    color:#000;
}

/* ARROW */
.arrow{
    transition:0.3s;
}

.menu.active .arrow{
    transform:rotate(90deg);
}

/* CONTENT */
.content{
    max-height:0;
    overflow:hidden;
    transition:0.4s ease;
    background:#0d0d0d;
    border-radius:0 0 15px 15px;
}

.content a{
    display:block;
    padding:14px 18px;
    color:#ccc;
    text-decoration:none;
    transition:0.3s;
}

.content a:hover{
    color:#00ffe1;
    padding-left:25px;
}

/* ANIM */
@keyframes led{
    0%{background-position:0%;}
    100%{background-position:400%;}
}

@keyframes pulse{
    0%{box-shadow:0 0 10px #ff00ff;}
    50%{box-shadow:0 0 25px #00ffe1;}
    100%{box-shadow:0 0 10px #ff00ff;}
}

</style>
</head>

<body>

<div class="bio-container">

    <div class="profile">

        <div class="avatar-rgb">
            <img src="https://i.imgur.com/Y8Ptf2v.jpeg">
        </div>

        <h1>NHP PLAY</h1>
        <p>Mods Play Together</p>

    </div>

    <div class="voucher-box" onclick="openRandomLink()">
        🎁 NHẬN VOUCHER HOT
    </div>

    <div class="accordion">

        <button class="menu">🔥 Link Tải Mods Và Mua Key <span class="arrow">▶</span></button>
        <div class="content">
            <a href="https://modzone.vn/" target="_blank">🌐 Modzone.vn</a>
        </div>

        <button class="menu">💬 Nhóm Hỗ Trợ Và Giao Lưu <span class="arrow">▶</span></button>
        <div class="content">
            <a href="https://zalo.me/84931056841">👨‍💻 Zalo Admin</a>
            <a href="https://zalo.me/g/ejufle686">📢 Nhóm Thông Báo</a>
            <a href="https://zalo.me/g/esfogb190">🎮 Nhóm Giao Lưu</a>
        </div>

        <button class="menu">🔑 Vượt Link Lấy Key Miễn Phí <span class="arrow">▶</span></button>
        <div class="content">
            <a href="https://hackviet.io/free-key/gtb">🚀 Link Get Key</a>
            <a href="https://youtu.be/Pk6hguWMCjc?si=eTjqrdwfKSuxDIf_">▶️ Video Hướng Dẫn</a>
        </div>

        <button class="menu">🛒 Shop Cày Thuê - Bán Acc <span class="arrow">▶</span></button>
        <div class="content">
            <a href="http://bitashop.vn/">💎 Bitashop.vn</a>
        </div>

        <button class="menu">🐟 Bản ID Cá <span class="arrow">▶</span></button>
        <div class="content">
            <a href="#">📂 Xem Bản ID Cá</a>
        </div>

    </div>

</div>

<script>

document.querySelectorAll(".menu").forEach(btn => {
    btn.addEventListener("click", () => {

        const content = btn.nextElementSibling;
        const isOpen = btn.classList.contains("active");

        // ❌ Đóng hết tất cả trước
        document.querySelectorAll(".menu").forEach(b => {
            b.classList.remove("active");
        });

        document.querySelectorAll(".content").forEach(c => {
            c.style.maxHeight = null;
        });

        // Nếu cái vừa click chưa mở thì mở nó
        if (!isOpen) {
            btn.classList.add("active");
            content.style.maxHeight = content.scrollHeight + "px";
        }

    });
});

const affLinks = [
"https://vt.tiktok.com/ZS9Fq7aFgeyGK-vEsMM/",
"https://vt.tiktok.com/ZS9FqcN79evrx-BVpAx/",
"https://vt.tiktok.com/ZS9FqcjGohs3W-RrGag/",
"https://vt.tiktok.com/ZS9FqcPX33eM2-SBJ5N/",
"https://vt.tiktok.com/ZS9FqcP1hk6dU-gtJz0/"
];

let used = [];

function openRandomLink(){

    if(used.length >= affLinks.length){
        used = [];
    }

    let pool = affLinks.filter(x => !used.includes(x));

    let r = pool[Math.floor(Math.random() * pool.length)];

    used.push(r);

    window.open(r, "_blank");
}

</script>

</body>
</html>
