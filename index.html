
<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NHP PLAY</title>

<style>

*{
    margin:0;
    paddinging:0;
    box-sizing:border-box;
}

body{
    background:#070707;
    font-family:Arial,sans-serif;
    min-height:100vh;
    paddinging:12px;
}

/* CONTAINER */
.bio-container{
    widthidth:100%;
    max-width:100%;
    margin:auto;
    position:relative;
    paddinging:4px;
    border-radius:25px;
}

/* RGB BORDER */
.bio-container::before{
    content:"";
    position:absolute;
    inset:-4px;
    border-radius:28px;

   -background:linear-gradient(
        90deg,
        #ff0000,
        #ff00ff,
        #00ffe1,
        #00ff00,
        #ff0000
    );

    background-size:400%;
    animation:led 6s linear infinite;
    filter:blur(8px);
    z-index:-1;
}

.bio-container::after{
    content:"";
    position:absolute;
    inset:2px;
    border-radius:22px;
    background:#070707;
    z-index:-1;
}

/* PROFILE */
.profile{
    text-align:center;
    paddinging:25px 15px;
}

/* AVATAR */
.avatar-rgb{
    widthth:180px;
    height:180px;
    margin:auto;
    border-radius:50%;
    position:relative;
}

.avatar-rgb::before{
    content:"";
    position:absolute;
    inset:-5px;
    border-radius:50%;

   -background:linear-gradient(
        90deg,
        #ff0000,
        #ff00ff,
        #00ffe1,
        #00ff00,
        #ff0000
    );

    background-size:400%;
    animation:led 6s linear infinite;
    filter:blur(7px);
    z-index:0;
}

.avatar-rgb img{
    widthth:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    position:relative;
    z-index:1;
    border:4px solid #111;
}

/* TITLE */
.profile h1{
    color:white;
    font-size:42px;
    margin-top:20px;

    text-shadow:
        0 0 10px #00ffe1,
        0 0 20px #ff00ff;
}

.profile p{
    color:#00ffe1;
    font-size:18px;
    margin-top:8px;
}

/* VOUCHER */
.voucher-box{
    background:linear-gradient(45deg,#ff00ff,#00ffe1);
    color:white;
    text-align:center;
    paddinging:22px;
    border-radius:18px;
    margin-bottom:20px;
    font-weight:bold;
    font-size:20px;
    cursor:pointer;

    animation:pulse 2s infinite;
}

/* MENU */
.menu{
    widthth:100%;
    background:#111;
    color:white;
    padding:20px;
    margin-top:16px;
    border:none;
    border-radius:18px;
    cursor:pointer;
    font-size:18px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    border:1px solid #00ffe1;

    transition:0.3s;
}

.menu:hover{
    background:#00ffe1;
    color:black;
}

/* ARROW */
.arrow{
    transition:0.3s;
}

.menu.active .arrow{
    transform:rotate(90deg);
}

/* CONTENT */
.content{
    max-height:0;
;
   -overflow:hidden;
    transition:0.5s;
    background:#0d0d0d;
    border-radius:0 0 18px 18px;
}

.content a{
    display:block;
    paddinging:18px 20px;
    color:#ccc;
    text-decoration:none;
    font-size:17px;
    transition:0.3s;
}

.content a:hover{
    color:#00ffe1;
    paddinging-left:28px;
}

/* RGB */
@keyframes led{

    0%{
        background-position:0%;
;
    }



    100%{
        background-position:400%;
;
    }



}

/* PULSE */
@keyframes pulse{

    0%{
       -box-shadow:0 0 10px #ff00ff;
    }

   

    50%{
        box-shadow:0 0 30px #00ffe1;
    }



    100%{
       -box-shadow:0 0 10px #ff00ff;
    }

}

/* MOBILE */
@media(max-width:768px){

    .profile h1{
        font-size:38px;
    }

    .avatar-rgb{
        widthth:170px;
        height:170px;
    }



    .menu{
        font-size:17px;
        paddinging:18px;
    }



}

</style>
</head>

<body>

<div class="bio-container">

    <div class="profile">

        <div class="avatar-rgb">
            <img src="https://i.imgur.com/Y8Ptf2v.jpeg">
        </div>

       -h1>NHP PLAY</h1>
        <p>Mods Play Together</p>

    </div>

    <div class="oucher-box" onclick="openRandomLink()">
        🎁 NHẬN VOUCHER HOT
    </div>

    <div class="accordion">

        <button class="menu">
            🔥 Link Tải Mods Và Mua Key
            <span class="arrow">▶</span>
        </button>

        <div class="content">
            <a href="https://modzone.vn/" target="_blank">
                🌐 Modzone.vn
            </a>
        </div>

        <button class="menu">
            💬 Nhóm Hỗ Trợ Và Giao Lưu
            <span class="arrow">▶</span>
        </button>

        <div class="content">
            <a href="https://zalo.me/84931056841" target="_blank">
                👨‍💻 Zalo Admin
            </a>

            <a href="https://zalo.me/g/ejufle686" target="_blank">
                📢 Nhóm Thông Báo
            </a>

            <a href="https://zalo.me/g/esfogb190" target="_blank">
                🎮 Nhóm Giao Lưu
            </a>
        </div>

    </div>

</div>

<script>

document.querySelectorAll(".menu").forEach(btn=>{

    btn.addEventListener("click",()=>{

        const content=btn.nextElementSibling;

        btn.classList.toggle("active");

        if(content.style.maxHeight){
            content.style.maxHeight=null;
        }else{
            content.style.maxHeight=
            content.scrollHeight+"px";
        }

    });

});

const affLinks=[

"https://vt.tiktok.com/ZS9Fq7aFgeyGK-vEsMM/",
"https://vt.tiktok.com/ZS9FqcN79evrx-BVpAx/",
"https://vt.tiktok.com/ZS9FqcjGohs3W-RrGag/",
"https://vt.tiktok.com/ZS9FqcPX33eM2-SBJ5N/",
"https://vt.tiktok.com/ZS9FqcP1hk6dU-gtJz0/",
"https://vt.tiktok.com/ZS9FqcHdTsLWC-ZDalx/"

];

let used=[];

function openRandomLink(){

    if(used.length>=affLinks.length){
        used=[];
    }

    let pool=
    affLinks.filter(x=>!used.includes(x));

    let r=
    pool[Math.floor(Math.random()*pool.length)];

    used.push(r);

    window.open(r,"_blank");

}

</script>

</body>
</html>
